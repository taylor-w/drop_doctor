name: Release

# Tag a commit to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the four self-contained Burrito binaries (cross-compiled from
# Linux via Zig) and attaches them to a GitHub Release for that tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the release and upload assets

jobs:
  build:
    name: Build binaries & publish release
    runs-on: ubuntu-latest
    env:
      MIX_ENV: prod
      # The pushed tag (e.g. "v0.2.3") becomes the app version, so the binary's
      # Burrito install dir is unique per release and end users always get a
      # fresh unpack. mix.exs strips the leading "v". Because this is on push:
      # tags, github.ref_name is the tag short name.
      APP_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.2"

      - name: Set up Zig (Burrito's cross-compiler)
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install packaging tools
        # xz: payload compression for every target.
        # p7zip-full: provides `7z`, required to build the Windows target.
        run: sudo apt-get update && sudo apt-get install -y xz-utils p7zip-full

      # Cache fetched dep SOURCES only — NOT _build. A release must compile from
      # a clean tree so the binary always matches the tagged source. _build holds
      # both compiled .beam files AND the assembled release at
      # _build/prod/rel/drop_doctor/. With the cache keyed only on mix.lock, a
      # source-only change restored a stale _build from an earlier release, and
      # `mix release` reused the already-assembled (old) rel — which is how
      # v0.2.0 and v0.2.1 shipped without the tour and Slate. Recompiling deps on
      # an infrequent release is a cheap price for a correct artifact.
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-release-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-release-deps-

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build and digest assets
        run: |
          mix assets.setup
          mix assets.deploy

      - name: Build all Burrito targets
        # --overwrite re-assembles the release even if one is already present,
        # so a leftover rel can never be wrapped into the binary by mistake.
        run: mix release --overwrite

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: burrito_out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
